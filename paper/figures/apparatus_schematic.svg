<svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="800" fill="#f8f8f8"/>
  
  <!-- Title -->
  <text x="600" y="30" font-size="24" font-weight="bold" text-anchor="middle" fill="#000">
    Apparatus: Motion-vs-Still Classification on Servo Rig
  </text>
  
  <!-- ============ LEFT SIDE: JETSON ORIN NANO ============ -->
  <g id="jetson">
    <!-- Main box -->
    <rect x="50" y="80" width="280" height="400" fill="#e8f4f8" stroke="#0066cc" stroke-width="2" rx="5"/>
    <text x="190" y="105" font-size="16" font-weight="bold" text-anchor="middle" fill="#0066cc">
      Jetson Orin Nano
    </text>
    <text x="190" y="130" font-size="12" text-anchor="middle" fill="#333">
      JetPack 6.2.2 | MAXN mode
    </text>
    
    <!-- I2C Bus 7 -->
    <rect x="70" y="150" width="240" height="50" fill="#fff9e6" stroke="#ff9900" stroke-width="1.5"/>
    <text x="190" y="170" font-size="12" font-weight="bold" text-anchor="middle" fill="#ff6600">I2C Bus 7</text>
    <text x="190" y="190" font-size="11" text-anchor="middle" fill="#333">Pins 3 (SDA), 5 (SCL)</text>
    
    <!-- GPIO Lines -->
    <rect x="70" y="215" width="240" height="60" fill="#ffe6e6" stroke="#cc0000" stroke-width="1.5"/>
    <text x="190" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#cc0000">GPIO Lines</text>
    <text x="190" y="255" font-size="11" text-anchor="middle" fill="#333">
      Pin 15 (INT1, line 85) | Pin 11 (line 112, reserved)
    </text>
    
    <!-- Ports/Interfaces -->
    <rect x="70" y="290" width="240" height="170" fill="#e6f3ff" stroke="#0066cc" stroke-width="1.5"/>
    <text x="190" y="310" font-size="12" font-weight="bold" text-anchor="middle" fill="#0066cc">Running Software</text>
    <text x="85" y="335" font-size="11" fill="#333">• mlc_poller (MLC path)</text>
    <text x="85" y="355" font-size="11" fill="#333">• imu_logger (raw accel)</text>
    <text x="85" y="375" font-size="11" fill="#333">• host_pipeline_parity</text>
    <text x="85" y="395" font-size="11" fill="#333">  (host inference)</text>
    <text x="85" y="415" font-size="11" fill="#333">• servo_sweep control</text>
    <text x="85" y="435" font-size="11" fill="#333">• stress-ng (optional)</text>
  </g>
  
  <!-- ============ CENTER: SENSOR & SERVO RIG ============ -->
  <g id="rig">
    <!-- Servo Motor -->
    <rect x="420" y="100" width="100" height="80" fill="#444" stroke="#000" stroke-width="2" rx="3"/>
    <text x="470" y="145" font-size="12" font-weight="bold" text-anchor="middle" fill="#fff">
      Servo Motor
    </text>
    <text x="470" y="165" font-size="10" text-anchor="middle" fill="#ccc">
      SG90 PWM
    </text>
    
    <!-- Servo Arm -->
    <line x1="470" y1="180" x2="470" y2="280" stroke="#333" stroke-width="8"/>
    <text x="510" y="230" font-size="11" fill="#333">Oscillates ±90°</text>
    <text x="510" y="245" font-size="10" fill="#666">@ 0.5 Hz sweep</text>
    
    <!-- IMU Sensor on arm -->
    <rect x="430" y="280" width="80" height="60" fill="#c0e0ff" stroke="#0066cc" stroke-width="2" rx="3"/>
    <text x="470" y="305" font-size="12" font-weight="bold" text-anchor="middle" fill="#0066cc">
      LSM6DSOX
    </text>
    <text x="470" y="325" font-size="10" text-anchor="middle" fill="#333">
      IMU (3-axis accel)
    </text>
    
    <!-- Motion indicator -->
    <circle cx="470" cy="360" r="40" fill="none" stroke="#ff6600" stroke-width="2" stroke-dasharray="5,5"/>
    <text x="470" y="365" font-size="11" text-anchor="middle" fill="#ff6600" font-weight="bold">
      MOTION
    </text>
  </g>
  
  <!-- ============ RIGHT SIDE: SUPPORT CHIPS & LOGIC ANALYZER ============ -->
  <g id="support">
    <!-- PCA9685 Servo Controller -->
    <rect x="620" y="100" width="150" height="90" fill="#fff0e6" stroke="#ff6600" stroke-width="1.5" rx="3"/>
    <text x="695" y="125" font-size="12" font-weight="bold" text-anchor="middle" fill="#ff6600">
      PCA9685
    </text>
    <text x="695" y="145" font-size="11" text-anchor="middle" fill="#333">
      Servo PWM Controller
    </text>
    <text x="695" y="165" font-size="10" text-anchor="middle" fill="#666">
      I2C addr 0x41 (A0 bridged)
    </text>
    
    <!-- Saleae Logic Analyzer -->
    <rect x="620" y="210" width="150" height="110" fill="#e6ffe6" stroke="#00aa00" stroke-width="2" rx="3"/>
    <text x="695" y="235" font-size="12" font-weight="bold" text-anchor="middle" fill="#00aa00">
      Saleae Logic
    </text>
    <text x="695" y="255" font-size="11" text-anchor="middle" fill="#333">
      Pro 8 (50 MS/s)
    </text>
    <text x="695" y="275" font-size="10" text-anchor="middle" fill="#666">
      D0: INT1 (line 85)
    </text>
    <text x="695" y="293" font-size="10" text-anchor="middle" fill="#666">
      D2: Ground-truth solenoid
    </text>
    <text x="695" y="311" font-size="10" text-anchor="middle" fill="#666">
      USB → Asus Desktop
    </text>
  </g>
  
  <!-- ============ WIRING CONNECTIONS ============ -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#333"/>
    </marker>
    <marker id="arrowhead-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0066cc"/>
    </marker>
    <marker id="arrowhead-red" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#cc0000"/>
    </marker>
    <marker id="arrowhead-orange" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff9900"/>
    </marker>
  </defs>
  
  <!-- I2C Bus 7 (Jetson → Sensor) -->
  <path d="M 330 175 L 380 175 L 380 310 L 430 310" 
        stroke="#0066cc" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-blue)"/>
  <text x="365" y="165" font-size="11" fill="#0066cc" font-weight="bold">I2C Bus 7</text>
  <text x="365" y="180" font-size="10" fill="#0066cc">addr 0x6A</text>
  
  <!-- I2C Bus 7 (Jetson → PCA9685) -->
  <path d="M 330 190 L 400 190 L 400 145 L 620 145" 
        stroke="#0066cc" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-blue)"/>
  <text x="375" y="140" font-size="10" fill="#0066cc">I2C Bus 7</text>
  
  <!-- INT1 Line (Sensor → Jetson) -->
  <path d="M 510 315 L 550 315 L 550 240 L 330 240" 
        stroke="#cc0000" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-red)"/>
  <text x="520" y="330" font-size="11" fill="#cc0000" font-weight="bold">INT1</text>
  <text x="520" y="345" font-size="10" fill="#cc0000">(Pin 15, line 85)</text>
  
  <!-- PCA9685 PWM → Servo -->
  <path d="M 695 190 L 695 220 L 470 220 L 470 180" 
        stroke="#ff9900" stroke-width="2.5" fill="none" marker-end="url(#arrowhead-orange)"/>
  <text x="575" y="210" font-size="11" fill="#ff9900" font-weight="bold">PWM</text>
  <text x="575" y="225" font-size="10" fill="#ff9900">(channel 0)</text>
  
  <!-- INT1 → Saleae D0 -->
  <path d="M 550 315 L 600 315 L 600 255 L 620 255" 
        stroke="#00aa00" stroke-width="2" fill="none" stroke-dasharray="3,3" marker-end="url(#arrowhead)"/>
  <text x="560" y="305" font-size="10" fill="#00aa00">INT1→D0</text>
  
  <!-- ============ LEGEND / NOTES ============ -->
  <rect x="50" y="520" width="1100" height="250" fill="#f0f0f0" stroke="#999" stroke-width="1" rx="3"/>
  
  <text x="70" y="545" font-size="14" font-weight="bold" fill="#000">Key Signal Paths:</text>
  
  <line x1="70" y1="560" x2="110" y2="560" stroke="#0066cc" stroke-width="2.5"/>
  <text x="120" y="565" font-size="12" fill="#333"><tspan font-weight="bold">I2C Bus 7:</tspan> Jetson ↔ LSM6DSOX, PCA9685 (servo control)</text>
  
  <line x1="70" y1="590" x2="110" y2="590" stroke="#cc0000" stroke-width="2.5"/>
  <text x="120" y="595" font-size="12" fill="#333"><tspan font-weight="bold">INT1 Line (PN.01):</tspan> Sensor INT assertion → Jetson GPIO (line 85)</text>
  
  <line x1="70" y1="620" x2="110" y2="620" stroke="#ff9900" stroke-width="2.5"/>
  <text x="120" y="625" font-size="12" fill="#333"><tspan font-weight="bold">PWM Ch 0:</tspan> PCA9685 servo control → SG90 motor</text>
  
  <line x1="70" y1="650" x2="110" y2="650" stroke="#00aa00" stroke-width="2" stroke-dasharray="3,3"/>
  <text x="120" y="655" font-size="12" fill="#333"><tspan font-weight="bold">Saleae Capture:</tspan> D0 (INT1), D2 (ground-truth solenoid); USB to desktop</text>
  
  <text x="70" y="720" font-size="11" fill="#555">
    <tspan font-weight="bold">Measurement:</tspan> Wire-level latency = time between INT1 rising edge and decision (measured via Saleae)
  </text>
  
  <text x="70" y="745" font-size="11" fill="#555">
    <tspan font-weight="bold">Power:</tspan> Jetson 3.3V rail powers GPIO/I2C; separate 5V supply for PCA9685
  </text>
  
  <text x="70" y="770" font-size="11" fill="#555">
    <tspan font-weight="bold">Stress:</tspan> stress-ng (matrixprod, 6 cores) for CPU saturation; verified via tegrastats
  </text>
</svg>
